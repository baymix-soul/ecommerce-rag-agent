server:
  port: 8080

spring:
  application:
    name: ecommerce-rag-agent

app:
  llm:
    base-url: "${LLM_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}"
    api-key: "${LLM_API_KEY:}"
    model: "${LLM_MODEL:}"
    max-tokens: ${LLM_MAX_TOKENS:2048}
    temperature: ${LLM_TEMPERATURE:0.7}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:30}
  vector:
    enabled: ${VECTOR_ENABLED:false}
    qdrant-url: ${QDRANT_URL:http://localhost:6333}
  product:
    data-path: classpath:data/products.json
  chat:
    mock-llm-enabled: ${MOCK_LLM_ENABLED:true}
    default-candidate-limit: 5
