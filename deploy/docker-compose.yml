version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant
    container_name: ecommerce-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage
    # 如需在宿主机直接访问 Qdrant，可取消下面 ports 注释
    # ports:
    #   - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # Redis 通常不需要暴露到宿主机，backend 通过 Docker 网络访问
    # 如需本地调试，可取消下面 ports 注释
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ../server
    container_name: ecommerce-backend
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - tts_audio:/app/data/tts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  qdrant_storage:
  redis_data:
  tts_audio:
